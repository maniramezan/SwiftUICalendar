<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Selection modes</title>
  <desc id="desc">Three cards showing single, range, and multiple selection modes.</desc>
  <rect width="960" height="360" rx="36" fill="#f8fafc"/>
  <g font-family="-apple-system, BlinkMacSystemFont, sans-serif">
    <rect x="80" y="70" width="220" height="220" rx="24" fill="#dbeafe"/>
    <text x="132" y="128" font-size="28" font-weight="700" fill="#1e3a8a">Single</text>
    <circle cx="190" cy="205" r="42" fill="#2563eb"/>
    <text x="178" y="214" font-size="26" font-weight="700" fill="#ffffff">15</text>
    <rect x="370" y="70" width="220" height="220" rx="24" fill="#ede9fe"/>
    <text x="424" y="128" font-size="28" font-weight="700" fill="#4c1d95">Range</text>
    <rect x="424" y="172" width="112" height="66" rx="33" fill="#7c3aed"/>
    <text x="438" y="214" font-size="24" font-weight="700" fill="#ffffff">10</text>
    <text x="494" y="214" font-size="24" font-weight="700" fill="#ffffff">20</text>
    <rect x="660" y="70" width="220" height="220" rx="24" fill="#dcfce7"/>
    <text x="704" y="128" font-size="28" font-weight="700" fill="#14532d">Multiple</text>
    <circle cx="722" cy="202" r="30" fill="#16a34a"/>
    <circle cx="770" cy="202" r="30" fill="#16a34a"/>
    <circle cx="818" cy="202" r="30" fill="#16a34a"/>
  </g>
</svg>
