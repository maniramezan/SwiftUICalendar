name: build

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: SwiftUICalendar
    steps:
      - name: Checkout SwiftUICalendar
        uses: actions/checkout@v6.0.3
        with:
          path: SwiftUICalendar

      - name: Select Swift toolchain
        run: bash ./scripts/select-swift-toolchain.sh

      - name: Cache SwiftPM dependencies and build artifacts
        uses: actions/cache@v5.0.5
        with:
          path: |
            SwiftUICalendar/.build
            SwiftUICalendar/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('SwiftUICalendar/Package.swift', 'SwiftUICalendar/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Validate Swift formatting
        run: bash ./scripts/lint.sh

      - name: Build package
        run: swift build -c debug

      - name: Check test coverage
        env:
          MINIMUM_COVERAGE: 79.5
        run: bash ./scripts/check-coverage.sh

      - name: Build DocC documentation
        run: bash ./scripts/build-docs.sh

  main-validation:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: SwiftUICalendar
    steps:
      - name: Checkout SwiftUICalendar
        uses: actions/checkout@v6.0.3
        with:
          path: SwiftUICalendar

      - name: Select Swift toolchain
        run: bash ./scripts/select-swift-toolchain.sh

      - name: Cache SwiftPM dependencies and build artifacts
        uses: actions/cache@v5.0.5
        with:
          path: |
            SwiftUICalendar/.build
            SwiftUICalendar/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('SwiftUICalendar/Package.swift', 'SwiftUICalendar/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Validate Swift formatting
        run: bash ./scripts/lint.sh

      - name: Build package
        run: swift build -c debug

      - name: Run full tests
        run: swift test

      - name: Check test coverage
        env:
          MINIMUM_COVERAGE: 79.5
        run: bash ./scripts/check-coverage.sh

      - name: Build DocC documentation
        run: bash ./scripts/build-docs.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: SwiftUICalendar/.build/docs

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: main-validation
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
