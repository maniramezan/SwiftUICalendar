name: build

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: SwiftUICalendar
    steps:
      - name: Checkout SwiftUICalendar
        uses: actions/checkout@v6.0.3
        with:
          path: SwiftUICalendar

      - name: Show Swift version
        run: swift --version

      - name: Cache SwiftPM dependencies and build artifacts
        uses: actions/cache@v5.0.5
        with:
          path: |
            SwiftUICalendar/.build
            SwiftUICalendar/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('SwiftUICalendar/Package.swift', 'SwiftUICalendar/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Validate Swift formatting
        run: bash ./scripts/lint.sh

      - name: Build package
        run: swift build -c debug

      - name: Run tests
        run: swift test

      - name: Build DocC documentation
        run: bash ./scripts/build-docs.sh

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: SwiftUICalendar/.build/docs

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
